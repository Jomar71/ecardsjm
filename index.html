<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Cards JM | Elite Digital Identity</title>
    <meta name="description" content="E-Cards JM - Tarjetas digitales profesionales">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
</head>
<body>
    <header id="main-header">
        <a class="logo" href="#">E-Cards<span class="logo-accent">JM</span></a>
        <nav id="top-nav">
            <div id="auth-nav-guest">
                <button onclick="showModal('login')">Login</button>
                <button onclick="showModal('register')">Regístrate</button>
            </div>
            <div id="auth-nav-user" style="display:none;">
                <span id="nav-username"></span>
                <button onclick="logout()">Salir</button>
            </div>
        </nav>
    </header>

    <main>
        <section id="landing" style="display:block;">
            <h1>Crea Tu Tarjeta Digital</h1>
            <button onclick="showModal('register')">Empezar Gratis</button>
        </section>

        <section id="admin" style="display:none;">
            <h2>Editor de Tarjetas</h2>
            <form id="cardForm">
                <input id="name" placeholder="Nombre">
                <input id="title" placeholder="Cargo">
                <button type="submit">Guardar</button>
            </form>
            <div id="preview">
                <h3 id="preview-name">Nombre</h3>
                <p id="preview-title">Cargo</p>
            </div>
        </section>

        <div id="modal" style="display:none;">
            <div id="modal-content">
                <span class="close" onclick="hideModal()">&times;</span>
                <div id="login-form">
                    <h3>Login</h3>
                    <input id="login-user" placeholder="Usuario">
                    <input id="login-pass" type="password" placeholder="Contraseña">
                    <button onclick="doLogin()">Entrar</button>
                </div>
                <div id="register-form" style="display:none;">
                    <h3>Registro</h3>
                    <input id="reg-user" placeholder="Usuario">
                    <input id="reg-pass" type="password" placeholder="Contraseña">
                    <button onclick="doRegister()">Crear</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
const API_BASE = '/api';

let token = localStorage.getItem('token');
let user = JSON.parse(localStorage.getItem('user') || 'null');

function showModal(type) {
    const modal = document.getElementById('modal');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (type === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
    }
    modal.style.display = 'block';
}

function hideModal() {
    document.getElementById('modal').style.display = 'none';
}

async function doRegister() {
    const username = document.getElementById('reg-user').value;
    const password = document.getElementById('reg-pass').value;
    
    try {
        const response = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await response.json();
        
        if (data.status === 'success') {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            token = data.token;
            user = data.user;
            updateUI();
            hideModal();
            showAdmin();
        } else {
            alert(data.message || 'Error');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

async function doLogin() {
    const username = document.getElementById('login-user').value;
    const password = document.getElementById('login-pass').value;
    
    try {
        const response = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await response.json();
        
        if (data.status === 'success') {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            token = data.token;
            user = data.user;
            updateUI();
            hideModal();
            showAdmin();
        } else {
            alert(data.error || 'Error');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    token = null;
    user = null;
    updateUI();
    showLanding();
}

function updateUI() {
    document.getElementById('auth-nav-guest').style.display = user ? 'none' : 'flex';
    document.getElementById('auth-nav-user').style.display = user ? 'flex' : 'none';
    if (user) {
        document.getElementById('nav-username').textContent = user.username;
    }
}

function showLanding() {
    document.getElementById('landing').style.display = 'block';
    document.getElementById('admin').style.display = 'none';
}

function showAdmin() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    loadCards();
}

document.getElementById('cardForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);
    data.id = Date.now().toString();
    
    try {
        const response = await fetch('/api/cards', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        alert('Tarjeta guardada!');
        loadCards();
    } catch (err) {
        alert('Error: ' + err.message);
    }
});

async function loadCards() {
    try {
        const response = await fetch('/api/cards', {
            headers: {'Authorization': `Bearer ${token}`}
        });
        const cards = await response.json();
        // Update dashboard
        console.log('Cards:', cards);
    } catch (err) {
        console.error(err);
    }
}

// Init
updateUI();
if (user) showAdmin();
else showLanding();
    </script>
</body>
</html>
