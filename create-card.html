<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de E-Cards | 9:16 Premium</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons for premium feel -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .create-container {
            display: grid;
            grid-template-columns: 420px 1fr;
            height: 100vh;
            background: var(--bg-deep);
        }

        .editor-pane {
            padding: 40px;
            overflow-y: auto;
            border-right: 1px solid var(--glass-border);
            background: var(--bg-recessed);
        }

        .preview-pane {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg-deep);
            position: relative;
        }

        /* 9:16 Responsive Card */
        .card-9-16 {
            width: min(90%, 380px);
            aspect-ratio: 9 / 16;
            background: #fff;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
            background-size: cover;
            background-position: center;
            color: #333;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Bottom alignment for footer elements */
        }

        .vertical-icons {
            position: absolute;
            left: 25px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .icon-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid currentColor;
            cursor: pointer;
            transition: 0.2s;
        }

        .qr-placeholder {
            position: absolute;
            right: 25px;
            bottom: 40px;
            width: 90px;
            height: 90px;
            background: transparent;
            border: 2px solid var(--primary);
            padding: 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-placeholder svg {
            width: 100%;
            height: 100%;
        }

        /* Editor Styles */
        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            margin: 24px 0 12px;
            font-weight: 700;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 24px;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .floating-share {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 32px;
            background: var(--primary-container);
            color: #fff;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: 700;
            border: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="create-container">
        <aside class="editor-pane">
            <a href="dashboard.html" style="color: var(--on-surface-variant); text-decoration: none; font-size: 0.8rem;">← VOLVER</a>
            <h2 style="margin: 20px 0 5px;">Diseñar Tarjeta</h2>
            <p style="color: var(--on-surface-variant); font-size: 0.9rem; margin-bottom: 30px;">Relación 9:16 | Mobile Optimized</p>

            <div class="section-title">1. Fondo de la Tarjeta</div>
            <label class="upload-area" id="bg-upload-label">
                <input type="file" id="bg-upload" hidden accept="image/*">
                <i data-lucide="image-plus" style="margin-bottom: 8px;"></i>
                <div style="font-size: 0.85rem;">Subir imagen de fondo</div>
            </label>

            <div class="section-title">2. Identificación</div>
            <div class="form-group">
                <label>Nombre y Apellido</label>
                <input type="text" id="in-name" placeholder="Juan Pérez" value="Juan Pérez">
            </div>

            <div class="section-title">3. Información de Contacto</div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="in-email" placeholder="nombre@empresa.com">
            </div>
            <div class="form-group">
                <label>Ubicación</label>
                <input type="text" id="in-loc" placeholder="Ciudad, País">
            </div>

            <div class="section-title">3. Redes Sociales</div>
            <div class="input-row">
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" id="in-wa" placeholder="Link o #">
                </div>
                <div class="form-group">
                    <label>Facebook</label>
                    <input type="text" id="in-fb" placeholder="Usuario">
                </div>
            </div>
            <div class="input-row">
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="in-ig" placeholder="@usuario">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" id="in-web" placeholder="https://...">
                </div>
            </div>
        </aside>

        <main class="preview-pane">
            <div class="card-9-16" id="card-preview">
                <!-- Background is set dynamic -->
                <div class="card-overlay">
                    <!-- Left Vertical Icons -->
                    <div class="vertical-icons">
                        <div class="icon-circle" style="color: #2563eb;"><i data-lucide="phone" style="width:16px;"></i></div>
                        <div class="icon-circle" style="color: #64748b;"><i data-lucide="mail" style="width:16px;"></i></div>
                        <div class="icon-circle" style="color: #f43f5e;"><i data-lucide="map-pin" style="width:16px;"></i></div>
                    </div>

                    <!-- Bottom Social Row -->
                    <div class="social-row">
                        <div class="icon-circle" style="color: #22c55e;"><i data-lucide="message-circle" style="width:18px;"></i></div>
                        <div class="icon-circle" style="color: #1d4ed8;"><i data-lucide="facebook" style="width:18px;"></i></div>
                        <div class="icon-circle" style="color: #d946ef;"><i data-lucide="instagram" style="width:18px;"></i></div>
                        <div class="icon-circle" style="color: #3b82f6;"><i data-lucide="map" style="width:18px;"></i></div>
                        <div class="icon-circle" style="color: #0ea5e9;"><i data-lucide="globe" style="width:18px;"></i></div>
                    </div>

                    <!-- QR Code (Right) -->
                    <div class="qr-placeholder">
                        <i data-lucide="qr-code" style="width: 100%; height: 100%; color: var(--primary);"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="floating-share" onclick="generateLink()">GENERAR LINK DE COMPARTIR</button>

    <script>
        lucide.createIcons();

        // Get ID from URL for editing
        const urlParams = new URLSearchParams(window.location.search);
        let editingId = urlParams.get('edit');

        // Background Upload Logic
        const bgUpload = document.getElementById('bg-upload');
        const cardPreview = document.getElementById('card-preview');
        
        bgUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    cardPreview.style.backgroundImage = `url('${e.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
        });

        // Dynamic Visibility & Preview
        const inputs = ['name', 'phone', 'email', 'loc', 'wa', 'fb', 'ig', 'web'];
        inputs.forEach(id => {
            const el = document.getElementById('in-' + id);
            el.addEventListener('input', updatePreview);
        });

        function updatePreview() {
            // Check visibility for vertical group
            toggleIcon('phone', 'in-phone');
            toggleIcon('mail', 'in-email');
            toggleIcon('map-pin', 'in-loc');

            // Check visibility for horizontal group
            toggleIcon('message-circle', 'in-wa');
            toggleIcon('facebook', 'in-fb');
            toggleIcon('instagram', 'in-ig');
            toggleIcon('map', 'in-loc'); // Secondary map use
            toggleIcon('globe', 'in-web');
        }

        function toggleIcon(iconName, inputId) {
            const input = document.getElementById(inputId);
            const iconEl = document.querySelector(`[data-lucide="${iconName}"]`).parentElement;
            if (input.value.trim() === "") {
                iconEl.style.opacity = "0.2";
                iconEl.style.pointerEvents = "none";
            } else {
                iconEl.style.opacity = "1";
                iconEl.style.pointerEvents = "auto";
            }
        }

        function generateId(fullName) {
            const parts = fullName.toLowerCase().trim().split(/\s+/);
            if (parts.length >= 2) {
                return `${parts[0]}-${parts[1]}`;
            }
            return parts[0] || 'card-' + Date.now();
        }

        function saveCardData() {
            const name = document.getElementById('in-name').value;
            const cardId = generateId(name);
            
            const cardData = {
                id: cardId,
                name: name,
                phone: document.getElementById('in-phone').value,
                email: document.getElementById('in-email').value,
                loc: document.getElementById('in-loc').value,
                wa: document.getElementById('in-wa').value,
                fb: document.getElementById('in-fb').value,
                ig: document.getElementById('in-ig').value,
                web: document.getElementById('in-web').value,
                bg: cardPreview.style.backgroundImage
            };

            localStorage.setItem('ecard_' + cardId, JSON.stringify(cardData));
            return cardId;
        }

        function generateLink() {
            const cardId = saveCardData();
            const shareUrl = window.location.origin + '/view-card.html?u=' + cardId;
            
            const tempInput = document.createElement('input');
            document.body.appendChild(tempInput);
            tempInput.value = shareUrl;
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);

            alert('¡Tarjeta guardada y link copiado!\n\nLink: ' + shareUrl);
            window.location.href = 'dashboard.html';
        }

        // Initialize if editing
        if (editingId) {
            const saved = localStorage.getItem('ecard_' + editingId);
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('in-name').value = data.name;
                document.getElementById('in-phone').value = data.phone;
                document.getElementById('in-email').value = data.email;
                document.getElementById('in-loc').value = data.loc;
                document.getElementById('in-wa').value = data.wa;
                document.getElementById('in-fb').value = data.fb;
                document.getElementById('in-ig').value = data.ig;
                document.getElementById('in-web').value = data.web;
                cardPreview.style.backgroundImage = data.bg;
                updatePreview();
            }
        }
    </script>
</body>
</html>
