<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Cards JM</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0, 220, 230, 0.1), transparent 40%);
        }
        
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 32px;
            text-align: center;
        }

        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .login-card p {
            color: var(--on-surface-variant);
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--on-surface-variant);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-recessed);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-container), var(--tertiary-container));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: var(--transition);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .login-footer {
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--on-surface-variant);
        }

        .login-footer a {
            color: var(--tertiary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--on-surface-variant);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                margin: 20px;
                border-radius: 24px;
            }

            .back-home {
                top: 20px;
                left: 20px;
            }

            .login-card h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← Volver al inicio</a>
    
    <div class="login-container">
        <div class="login-card glass">
            <div class="logo" style="justify-content: center; margin-bottom: 32px;">
                <span>E-Cards</span> JM
            </div>
            <h2>Bienvenido</h2>
            <p>Acceda a su identidad digital profesional.</p>
            
                <div id="login-view">
                    <form id="loginForm">
                        <div class="input-group">
                            <label>Nombre de Usuario</label>
                            <input type="text" id="username" placeholder="Tu usuario" required>
                        </div>
                        <div class="input-group">
                            <label>Contraseña</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-submit">Ingresar</button>
                        <p id="error-msg" style="color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none;"></p>
                    </form>
                    <div class="login-footer">
                        Solo un administrador puede proporcionar credenciales de acceso.
                    </div>
                </div>
            
            <div style="margin-top: 30px; font-size: 0.75rem; color: var(--on-surface-variant); padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.03);">
                <b>Nota:</b> El sistema ha sido migrado a una base de datos real. Ya puedes ingresar con tu <b>nuevo usuario corporativo</b>.
            </div>
        </div>
    </div>

    <script>
        // Login Logic
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = "none";

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('ecards_token', data.token);
                    localStorage.setItem('ecards_user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = data.message || data.error || "Error al iniciar sesión";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.innerText = "Error de conexión con el servidor";
                errorMsg.style.display = "block";
            }
        };
    </script>
</body>
</html>
